<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3팀</title>
<!-- 링크 공유 시 첫 슬라이드가 미리보기로 뜨도록 -->
<meta property="og:type" content="website" />
<meta property="og:title" content="3팀" />
<meta property="og:description" content="여기를 눌러 발표 자료(PPT)를 확인하세요." />
<meta property="og:image" content="https://lkw07309-gif.github.io/lkw/presentation/media/image1.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="3팀" />
<meta name="twitter:description" content="여기를 눌러 발표 자료(PPT)를 확인하세요." />
<meta name="twitter:image" content="https://lkw07309-gif.github.io/lkw/presentation/media/image1.png" />
<style>
  :root {
    --navy-0:#081222; --navy-1:#0b1a30; --navy-2:#0e2743;
    --fg:#eef4fb; --muted:#9fb3c8; --line:rgba(255,255,255,.12);
    --accent:#ff7a2f; --accent-b:#5b9bd5;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; overflow:hidden; }
  body {
    background:
      radial-gradient(1200px 700px at 78% -8%, rgba(91,155,213,.18), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(255,122,47,.10), transparent 55%),
      linear-gradient(160deg, var(--navy-1) 0%, var(--navy-0) 60%, #060d18 100%);
    color:var(--fg);
    font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    height:100dvh; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== 상단 바 ===== */
  header {
    display:flex; align-items:center; gap:14px;
    padding:18px 26px; flex:0 0 auto; z-index:5;
  }
  .brand { display:flex; align-items:center; gap:12px; font-weight:800; letter-spacing:.5px; }
  .brand .mark {
    width:26px; height:26px; border-radius:7px; display:grid; place-items:center;
    background:linear-gradient(135deg, var(--accent), #ffb27a); color:#0b1a30; font-size:14px; font-weight:900;
  }
  .brand .sep { width:1px; height:16px; background:var(--line); }
  .brand .kicker { color:var(--muted); font-size:12px; letter-spacing:3px; font-weight:600; }
  header .spacer { flex:1; }
  .top-links { display:flex; gap:8px; align-items:center; }
  .chip {
    color:var(--fg); text-decoration:none; font-size:12.5px; letter-spacing:.3px;
    border:1px solid var(--line); padding:8px 13px; border-radius:999px;
    background:rgba(255,255,255,.04); transition:border-color .15s, background .15s; white-space:nowrap;
  }
  .chip:hover { border-color:var(--accent-b); background:rgba(91,155,213,.12); }
  .tag { color:var(--muted); font-size:12px; letter-spacing:2px; padding-right:4px; }

  /* ===== 스테이지 ===== */
  main { flex:1 1 auto; position:relative; min-height:0; display:flex; align-items:center; justify-content:center; padding:6px 64px 10px; }
  .stage { position:relative; width:100%; max-width:1180px; height:100%; display:flex; align-items:center; justify-content:center; cursor:pointer; }

  .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(.985); pointer-events:none; transition:opacity .45s ease, transform .45s ease; }
  .slide.active { opacity:1; transform:scale(1); pointer-events:auto; }
  .card {
    position:relative; max-width:100%; max-height:100%;
    border-radius:16px; overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 30px 80px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.05) inset;
    background:#05101d;
  }
  .card img, .card video { display:block; max-width:100%; max-height:calc(100dvh - 190px); object-fit:contain; }
  /* 영상 슬라이드는 클릭 넘김 위에서 재생 버튼이 눌리도록 */
  .slide.vid .card { z-index:4; }

  /* 실제 앱 임베드 슬라이드 */
  .slide.app .card { z-index:4; width:min(1160px,100%); height:calc(100dvh - 168px); background:#F5F1E7; }
  .slide.app iframe { width:100%; height:100%; border:0; display:block; }
  .app-open {
    position:absolute; top:12px; right:12px; z-index:6;
    display:inline-flex; align-items:center; gap:6px;
    font-size:12.5px; font-weight:700; color:#fff; text-decoration:none;
    background:rgba(15,26,40,.82); border:1px solid rgba(255,255,255,.18);
    padding:8px 13px; border-radius:999px; backdrop-filter:blur(6px);
  }
  .app-open:hover { background:rgba(255,122,47,.92); }
  .app-badge {
    position:absolute; left:12px; top:12px; z-index:6;
    font-size:11.5px; font-weight:800; letter-spacing:.5px; color:#0b1a30;
    background:linear-gradient(135deg,#ff7a2f,#ffb27a); padding:6px 12px; border-radius:999px;
  }

  /* 왼쪽 되돌리기 클릭영역 */
  .prev-zone { position:absolute; left:0; top:0; bottom:0; width:16%; z-index:3; cursor:w-resize; }

  /* ===== 우측 점 네비 ===== */
  .dots { position:absolute; right:22px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:12px; z-index:5; }
  .dot { width:9px; height:9px; border-radius:50%; border:1px solid rgba(255,255,255,.35);
    background:transparent; cursor:pointer; padding:0; transition:all .2s; }
  .dot:hover { border-color:var(--accent-b); }
  .dot.on { background:var(--accent); border-color:var(--accent); box-shadow:0 0 0 4px rgba(255,122,47,.18); }

  /* ===== 하단 바 ===== */
  footer { flex:0 0 auto; display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
    padding:16px 30px 22px; z-index:5; }
  .counter { font-size:15px; letter-spacing:1px; font-weight:700; }
  .counter b { color:var(--accent); font-size:22px; }
  .counter span { color:var(--muted); }
  .section-label { text-align:center; color:var(--accent-b); letter-spacing:4px; font-size:12px; font-weight:700; }
  .arrows { display:flex; gap:10px; justify-content:flex-end; }
  .arrow { width:48px; height:44px; border-radius:11px; border:1px solid var(--line);
    background:rgba(255,255,255,.04); color:var(--fg); font-size:18px; cursor:pointer;
    display:grid; place-items:center; transition:all .15s; }
  .arrow:hover:not(:disabled) { border-color:var(--accent-b); background:rgba(91,155,213,.14); }
  .arrow:disabled { opacity:.3; cursor:not-allowed; }

  .hint { position:absolute; left:50%; bottom:74px; transform:translateX(-50%);
    color:var(--muted); font-size:11.5px; letter-spacing:.4px; opacity:.7; z-index:5; pointer-events:none; }

  @media (max-width:820px) {
    main { padding:4px 16px 6px; }
    .dots { right:8px; gap:9px; }
    .brand .kicker { display:none; }
    footer { padding:12px 16px 18px; }
    .arrow { width:42px; height:40px; }
    .card img, .card video { max-height:calc(100dvh - 210px); }
    .hint { display:none; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="mark">3</span>
      <span>3팀</span>
      <span class="sep"></span>
      <span class="kicker">PRESENTATION · 2026</span>
    </div>
    <span class="spacer"></span>
    <div class="top-links">
      <span class="tag">발표자료 · 웹</span>
      <a class="chip" id="ghLink" href="https://github.com/lkw07309-gif/lkw/blob/main/presentation/presentation.pptx" target="_blank" rel="noopener">GitHub PPT</a>
      <a class="chip" id="dlLink" href="presentation.pptx" download>PPTX 다운로드</a>
    </div>
  </header>

  <main>
    <div class="stage" id="stage">
      <div class="prev-zone" id="prevZone" title="이전"></div>

      <div class="slide active"><div class="card"><img src="media/image1.png" alt="슬라이드 1" /></div></div>
      <div class="slide"><div class="card"><img src="media/image2.png" alt="슬라이드 2" /></div></div>
      <div class="slide"><div class="card"><img src="media/image3.png" alt="슬라이드 3" /></div></div>
      <div class="slide"><div class="card"><img src="media/image4.png" alt="슬라이드 4" /></div></div>
      <div class="slide"><div class="card"><img src="media/image5.png" alt="슬라이드 5" /></div></div>
      <div class="slide"><div class="card"><img src="media/image6.png" alt="슬라이드 6" /></div></div>
      <div class="slide app">
        <div class="card">
          <span class="app-badge">LIVE APP · Rolo</span>
          <a class="app-open" href="rolo.html" target="_blank" rel="noopener">⛶ 전체화면으로 열기</a>
          <iframe src="rolo.html" title="Rolo 앱" loading="lazy"></iframe>
        </div>
      </div>
      <div class="slide vid"><div class="card"><video src="media/VAHOSGxEj_0.mp4" poster="media/image8.jpeg" controls playsinline preload="metadata"></video></div></div>

      <div class="dots" id="dots"></div>
    </div>
    <div class="hint" id="hint">화면 클릭 · → 방향키로 다음 · 7번은 실제 앱(직접 조작) · 8번 영상은 ▶ 재생</div>
  </main>

  <footer>
    <div class="counter" id="counter"><b>01</b><span> / 08</span></div>
    <div class="section-label" id="sectionLabel">3팀 발표자료</div>
    <div class="arrows">
      <button class="arrow" id="prev" aria-label="이전">←</button>
      <button class="arrow" id="next" aria-label="다음">→</button>
    </div>
  </footer>

<script>
(function () {
  var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
  var total = slides.length, idx = 0;
  var counter = document.getElementById('counter');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var dotsWrap = document.getElementById('dots');
  var hint = document.getElementById('hint');
  var pad = function (n) { return (n < 10 ? '0' : '') + n; };

  // 점 네비 생성
  var dots = slides.map(function (_, i) {
    var d = document.createElement('button');
    d.className = 'dot'; d.setAttribute('aria-label', (i + 1) + '번 슬라이드');
    d.addEventListener('click', function (e) { e.stopPropagation(); show(i); });
    dotsWrap.appendChild(d);
    return d;
  });

  function pauseAll() {
    slides.forEach(function (s) { var v = s.querySelector('video'); if (v) v.pause(); });
  }
  function show(n) {
    idx = Math.max(0, Math.min(total - 1, n));
    pauseAll();
    slides.forEach(function (s, i) { s.classList.toggle('active', i === idx); });
    dots.forEach(function (d, i) { d.classList.toggle('on', i === idx); });
    counter.innerHTML = '<b>' + pad(idx + 1) + '</b><span> / ' + pad(total) + '</span>';
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === total - 1;
    if (hint && idx > 0) hint.style.display = 'none';
  }
  function go(d) { show(idx + d); }

  // 스테이지 클릭 → 다음 (영상/링크/좌측영역은 각자 stopPropagation)
  document.getElementById('stage').addEventListener('click', function () { go(1); });
  document.getElementById('prevZone').addEventListener('click', function (e) { e.stopPropagation(); go(-1); });
  // 영상 클릭은 재생용 — 넘김 방지
  slides.forEach(function (s) {
    var v = s.querySelector('video');
    if (v) v.addEventListener('click', function (e) { e.stopPropagation(); });
    // 앱 슬라이드: 카드 영역 클릭이 슬라이드 넘김으로 이어지지 않게
    var appCard = s.classList.contains('app') ? s.querySelector('.card') : null;
    if (appCard) appCard.addEventListener('click', function (e) { e.stopPropagation(); });
  });
  // 상단 링크 클릭 시 넘김 방지
  ['ghLink', 'dlLink'].forEach(function (id) {
    document.getElementById(id).addEventListener('click', function (e) { e.stopPropagation(); });
  });

  prevBtn.addEventListener('click', function (e) { e.stopPropagation(); go(-1); });
  nextBtn.addEventListener('click', function (e) { e.stopPropagation(); go(1); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft') go(-1);
    else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
    else if (e.key === 'Home') show(0);
    else if (e.key === 'End') show(total - 1);
  });

  show(0);
})();
</script>
</body>
</html>
