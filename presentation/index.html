<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>발표 자료</title>
<!-- 링크 공유 시 첫 슬라이드가 미리보기로 뜨도록 -->
<meta property="og:type" content="website" />
<meta property="og:title" content="발표 자료 — PPT 보기" />
<meta property="og:description" content="여기를 눌러 발표 자료(PPT)를 확인하세요." />
<meta property="og:image" content="https://lkw07309-gif.github.io/lkw/presentation/media/image1.png" />
<meta property="og:url" content="https://lkw07309-gif.github.io/lkw/presentation/" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="발표 자료 — PPT 보기" />
<meta name="twitter:description" content="여기를 눌러 발표 자료(PPT)를 확인하세요." />
<meta name="twitter:image" content="https://lkw07309-gif.github.io/lkw/presentation/media/image1.png" />
<style>
  :root { --bg:#0d0f14; --panel:#161a22; --line:#2a2f3a; --fg:#e8ecf3; --muted:#9aa4b2; --accent:#4f8cff; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif; }
  body { display:flex; flex-direction:column; }

  header { display:flex; align-items:center; gap:12px; padding:12px 18px;
    border-bottom:1px solid var(--line); flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .spacer { flex:1; }
  .dl { color:var(--fg); text-decoration:none; font-size:13px; border:1px solid var(--line);
    padding:7px 12px; border-radius:8px; background:var(--panel); }
  .dl:hover { border-color:var(--accent); }

  main { flex:1; display:flex; align-items:center; justify-content:center; padding:18px; min-height:0; }
  .stage { width:100%; max-width:1100px; }
  .frame {
    position:relative; width:100%; aspect-ratio:4/3; background:#000;
    border:1px solid var(--line); border-radius:12px; overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
    display:flex; align-items:center; justify-content:center;
  }
  .slide { display:none; width:100%; height:100%; position:relative; }
  .slide.active { display:flex; align-items:center; justify-content:center; }
  /* 영상 슬라이드는 좌우 넘김 클릭영역보다 위에 두어 재생 버튼이 눌리게 함 */
  .slide.vid.active { z-index:3; }
  .slide img, .slide video { max-width:100%; max-height:100%; object-fit:contain; display:block; }

  /* 클릭 영역 (좌/우 넘기기) */
  .nav-zone { position:absolute; top:0; bottom:0; width:20%; cursor:pointer; z-index:2; }
  .nav-zone.left { left:0; } .nav-zone.right { right:0; }

  .controls { display:flex; align-items:center; justify-content:center; gap:16px;
    padding:14px; border-top:1px solid var(--line); }
  button.ctrl { background:var(--panel); color:var(--fg); border:1px solid var(--line);
    width:44px; height:44px; border-radius:10px; font-size:18px; cursor:pointer; }
  button.ctrl:hover { border-color:var(--accent); }
  button.ctrl:disabled { opacity:.35; cursor:not-allowed; }
  .counter { font-variant-numeric:tabular-nums; color:var(--muted); min-width:60px; text-align:center; }
  .hint { text-align:center; color:var(--muted); font-size:12px; padding:0 0 14px; }
</style>
</head>
<body>
  <header>
    <h1>📊 발표 자료</h1>
    <span class="spacer"></span>
    <a class="dl" href="https://github.com/lkw07309-gif/lkw/blob/main/presentation/presentation.pptx" target="_blank" rel="noopener">GitHub에서 PPT 열기</a>
    <a class="dl" href="presentation.pptx" download>PPTX 다운로드</a>
  </header>

  <main>
    <div class="stage">
      <div class="frame" id="frame">
        <div class="nav-zone left"  id="zoneL" title="이전"></div>
        <div class="nav-zone right" id="zoneR" title="다음"></div>

        <div class="slide active"><img src="media/image1.png" alt="슬라이드 1" /></div>
        <div class="slide"><img src="media/image2.png" alt="슬라이드 2" /></div>
        <div class="slide"><img src="media/image3.png" alt="슬라이드 3" /></div>
        <div class="slide"><img src="media/image4.png" alt="슬라이드 4" /></div>
        <div class="slide"><img src="media/image5.png" alt="슬라이드 5" /></div>
        <div class="slide"><img src="media/image6.png" alt="슬라이드 6" /></div>
        <div class="slide vid">
          <video src="media/VAHOSK5qjvs.mp4" poster="media/image7.jpeg" controls playsinline preload="metadata"></video>
        </div>
        <div class="slide vid">
          <video src="media/VAHOSGxEj_0.mp4" poster="media/image8.jpeg" controls playsinline preload="metadata"></video>
        </div>
      </div>
    </div>
  </main>

  <div class="controls">
    <button class="ctrl" id="prev" aria-label="이전 슬라이드">‹</button>
    <span class="counter" id="counter">1 / 8</span>
    <button class="ctrl" id="next" aria-label="다음 슬라이드">›</button>
    <button class="ctrl" id="fs" aria-label="전체화면" title="전체화면">⛶</button>
  </div>
  <div class="hint">← → 방향키 · 화면 좌우 클릭으로 넘기기 · 7·8번 슬라이드는 영상입니다</div>

<script>
(function () {
  var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
  var total = slides.length, idx = 0;
  var counter = document.getElementById('counter');
  var prev = document.getElementById('prev'), next = document.getElementById('next');

  function pauseAll() {
    slides.forEach(function (s) {
      var v = s.querySelector('video');
      if (v) { v.pause(); }
    });
  }
  function show(n) {
    idx = Math.max(0, Math.min(total - 1, n));
    pauseAll();
    slides.forEach(function (s, i) { s.classList.toggle('active', i === idx); });
    counter.textContent = (idx + 1) + ' / ' + total;
    prev.disabled = idx === 0;
    next.disabled = idx === total - 1;
  }
  function go(d) { show(idx + d); }

  prev.addEventListener('click', function () { go(-1); });
  next.addEventListener('click', function () { go(1); });
  document.getElementById('zoneL').addEventListener('click', function () { go(-1); });
  document.getElementById('zoneR').addEventListener('click', function () { go(1); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft') go(-1);
    else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  });
  document.getElementById('fs').addEventListener('click', function () {
    var el = document.getElementById('frame');
    if (!document.fullscreenElement) { (el.requestFullscreen || el.webkitRequestFullscreen).call(el); }
    else { document.exitFullscreen(); }
  });

  show(0);
})();
</script>
</body>
</html>
