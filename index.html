<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>운명의 카드 — 고민은 카드에게</title>
<style>
  /* ===== 폰트 (구글 폰트, 실패해도 기본폰트로 폴백) ===== */
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Jua&display=swap');

  :root {
    --bg-0: #0a0806;
    --bg-1: #14100a;
    --wood: #8a5a2b;
    --wood-dark: #5a3818;
    --wood-light: #c08a4a;
    --gold: #f5c542;
    --gold-soft: #e8b830;
    --parch: #ece0c4;
    --parch-line: #c9b489;
    --ink: #3a2b18;
    --frame: #6a3d8f;
    --frame-glow: #b169e0;
    --danger: #c0392b;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    min-height: 100%;
    font-family: 'Gowun Batang', 'Nanum Myeongjo', serif;
    color: var(--parch);
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(1200px 600px at 50% -10%, #241a10 0%, transparent 60%),
      radial-gradient(900px 900px at 90% 110%, #1a130c 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    position: relative;
  }

  /* 떠다니는 불빛 입자 배경 */
  .embers { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .ember {
    position: absolute; bottom: -10px;
    width: 4px; height: 4px; border-radius: 50%;
    background: radial-gradient(circle, rgba(245,197,66,.9), rgba(245,197,66,0));
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: .8; }
    90%  { opacity: .6; }
    100% { transform: translateY(-105vh) translateX(var(--drift, 20px)); opacity: 0; }
  }

  .wrap { width: 100%; max-width: 980px; position: relative; z-index: 1; }

  /* ===== 헤더 배너 ===== */
  header { text-align: center; margin-bottom: 8px; }
  .banner {
    display: inline-block;
    position: relative;
    padding: 16px 46px;
    margin: 6px auto 4px;
    background:
      linear-gradient(180deg, var(--wood-light), var(--wood) 45%, var(--wood-dark));
    border: 3px solid var(--wood-dark);
    border-radius: 14px;
    box-shadow:
      0 6px 0 #2a1808,
      0 10px 26px rgba(0,0,0,.55),
      inset 0 2px 0 rgba(255,255,255,.18);
  }
  .banner::before, .banner::after {
    content: ""; position: absolute; top: 50%; width: 18px; height: 18px;
    background: radial-gradient(circle at 35% 35%, #ffe08a, #b5832e);
    border: 2px solid #4a2e12; border-radius: 50%;
    transform: translateY(-50%);
    box-shadow: inset 0 0 4px rgba(0,0,0,.4);
  }
  .banner::before { left: 12px; }
  .banner::after  { right: 12px; }
  .banner h1 {
    margin: 0;
    font-family: 'Jua', 'Gowun Batang', serif;
    font-size: clamp(22px, 5vw, 34px);
    letter-spacing: 2px;
    color: #fff4d6;
    text-shadow: 0 2px 0 #5a3818, 0 3px 6px rgba(0,0,0,.5);
  }
  .subtitle {
    margin: 10px 0 0;
    font-size: clamp(13px, 3.4vw, 16px);
    color: #d9c79c;
    letter-spacing: .5px;
    opacity: .9;
  }

  /* ===== 입력 패널 ===== */
  .panel {
    margin: 26px auto 0;
    max-width: 620px;
    background:
      linear-gradient(180deg, rgba(40,30,18,.92), rgba(24,18,11,.92));
    border: 2px solid var(--wood-dark);
    border-radius: 16px;
    padding: 22px 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .panel label {
    display: block; font-family: 'Jua', serif;
    color: var(--gold); font-size: 16px; margin-bottom: 10px; letter-spacing: 1px;
  }
  .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
  #question {
    flex: 1 1 240px;
    min-width: 0;
    font-family: 'Gowun Batang', serif;
    font-size: 16px;
    color: var(--ink);
    padding: 14px 16px;
    border-radius: 12px;
    border: 2px solid var(--parch-line);
    background:
      repeating-linear-gradient(180deg, var(--parch), var(--parch) 30px, #e3d6b6 31px),
      var(--parch);
    box-shadow: inset 0 2px 6px rgba(0,0,0,.18);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  #question::placeholder { color: #9a8763; }
  #question:focus { border-color: var(--gold); box-shadow: inset 0 2px 6px rgba(0,0,0,.18), 0 0 0 3px rgba(245,197,66,.25); }

  .btn {
    font-family: 'Jua', serif;
    cursor: pointer;
    border: none;
    border-radius: 12px;
    padding: 14px 22px;
    font-size: 16px;
    letter-spacing: 1px;
    color: #2a1808;
    background: linear-gradient(180deg, #ffe08a, var(--gold) 50%, var(--gold-soft));
    border: 2px solid #8a6314;
    box-shadow: 0 4px 0 #8a6314, 0 6px 14px rgba(0,0,0,.4);
    transition: transform .08s, box-shadow .08s, filter .15s;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(1.06); }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #8a6314, 0 3px 8px rgba(0,0,0,.4); }
  .btn.secondary {
    color: #f3e7c8;
    background: linear-gradient(180deg, #6a4a26, #4a3016);
    border-color: #2a1808;
    box-shadow: 0 4px 0 #2a1808, 0 6px 14px rgba(0,0,0,.4);
  }
  .btn[disabled] { opacity: .5; cursor: not-allowed; filter: grayscale(.3); }

  .chips { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    cursor: pointer; font-size: 13px; font-family: 'Gowun Batang', serif;
    color: #e7d6ac; background: rgba(245,197,66,.08);
    border: 1px solid rgba(245,197,66,.35);
    border-radius: 999px; padding: 6px 12px; transition: background .15s, transform .08s;
  }
  .chip:hover { background: rgba(245,197,66,.2); }
  .chip:active { transform: scale(.96); }

  /* ===== 스테이지 ===== */
  .stage { margin-top: 30px; text-align: center; min-height: 60px; }
  .stage-title {
    font-family: 'Jua', serif; font-size: clamp(17px, 4.4vw, 22px);
    color: #fff4d6; letter-spacing: 1px;
    display: inline-block; padding: 12px 28px;
    background: linear-gradient(180deg, var(--wood-light), var(--wood) 50%, var(--wood-dark));
    border: 3px solid var(--wood-dark); border-radius: 12px;
    box-shadow: 0 5px 0 #2a1808, 0 8px 20px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.15);
    text-shadow: 0 2px 0 #5a3818;
    opacity: 0; transform: translateY(-8px); transition: opacity .3s, transform .3s;
  }
  .stage-title.show { opacity: 1; transform: translateY(0); }

  .cards {
    margin: 34px auto 0;
    display: flex; gap: clamp(14px, 4vw, 34px);
    justify-content: center; align-items: center;
    flex-wrap: wrap; perspective: 1400px;
  }

  /* ===== 카드 ===== */
  .card {
    --w: clamp(140px, 30vw, 200px);
    width: var(--w);
    height: calc(var(--w) * 1.45);
    position: relative;
    cursor: pointer;
    perspective: 1400px;
    border-radius: 16px;
    opacity: 1;
    animation: deal .5s ease backwards;
  }
  .card-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform .7s cubic-bezier(.2,.8,.25,1);
    border-radius: 16px;
  }
  .card:nth-child(1) { animation-delay: .05s; }
  .card:nth-child(2) { animation-delay: .18s; }
  .card:nth-child(3) { animation-delay: .31s; }
  @keyframes deal {
    from { opacity: 0; transform: translateY(40px) rotateZ(-6deg) scale(.85); }
    to   { opacity: 1; transform: translateY(0) rotateZ(0) scale(1); }
  }

  .card.hoverable:hover .card-inner { transform: translateY(-12px); }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.flipped.hoverable:hover .card-inner { transform: rotateY(180deg) translateY(-4px); }
  .card.dimmed { opacity: .4; filter: grayscale(.4) brightness(.8); pointer-events: none; }

  .face {
    position: absolute; inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* 카드 뒷면 */
  .back {
    background:
      radial-gradient(circle at 50% 32%, rgba(177,105,224,.35), transparent 60%),
      linear-gradient(160deg, #2a1740, #3a2255 50%, #1c0f2c);
    border: 3px solid var(--frame);
    box-shadow:
      inset 0 0 0 2px rgba(245,197,66,.25),
      inset 0 0 30px rgba(0,0,0,.6),
      0 10px 26px rgba(0,0,0,.55);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .back::before {
    content: ""; position: absolute; inset: 10px;
    border: 2px dashed rgba(245,197,66,.4); border-radius: 10px;
  }
  .rune {
    font-family: 'Jua', serif; font-size: clamp(46px, 11vw, 72px);
    color: var(--gold);
    text-shadow: 0 0 14px rgba(245,197,66,.7), 0 0 30px rgba(177,105,224,.6);
    animation: pulse 2.4s ease-in-out infinite;
  }
  .back .paw { font-size: clamp(20px, 5vw, 30px); margin-top: 6px; filter: drop-shadow(0 0 6px rgba(177,105,224,.7)); }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: .92; }
    50%      { transform: scale(1.08); opacity: 1; }
  }

  /* 카드 앞면 (결과) */
  .front {
    transform: rotateY(180deg);
    background:
      radial-gradient(circle at 50% 20%, #fff7e2, transparent 55%),
      repeating-linear-gradient(180deg, var(--parch), var(--parch) 26px, #e1d2af 27px),
      var(--parch);
    border: 3px solid var(--gold);
    box-shadow:
      inset 0 0 0 2px rgba(106,61,143,.4),
      inset 0 0 22px rgba(120,90,40,.25),
      0 10px 26px rgba(0,0,0,.55);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 16px 14px;
  }
  .front .crest { font-size: clamp(26px, 6vw, 36px); margin-bottom: 8px; filter: drop-shadow(0 2px 2px rgba(0,0,0,.25)); }
  .front .result {
    font-family: 'Gowun Batang', serif; font-weight: 700;
    color: var(--ink); line-height: 1.4;
    font-size: clamp(15px, 3.6vw, 19px);
    text-shadow: 0 1px 0 rgba(255,255,255,.5);
    word-break: keep-all;
  }
  .front .tag {
    margin-top: 12px; font-family: 'Jua', serif; font-size: 12px;
    letter-spacing: 1px; color: #7a5a2a;
    border-top: 1px solid var(--parch-line); padding-top: 8px;
  }

  /* 번쩍이는 빛 */
  .flash {
    position: fixed; inset: 0; z-index: 50; pointer-events: none;
    background: radial-gradient(circle at var(--fx, 50%) var(--fy, 50%), rgba(255,255,255,.95), rgba(245,197,66,.5) 30%, transparent 60%);
    opacity: 0;
  }
  .flash.go { animation: flashAnim .55s ease-out; }
  @keyframes flashAnim {
    0%   { opacity: 0; }
    18%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .controls { margin-top: 34px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; opacity: 0; transition: opacity .4s; }
  .controls.show { opacity: 1; }

  footer { margin-top: 46px; text-align: center; color: #7c6a48; font-size: 12px; line-height: 1.7; z-index: 1; }
  footer .hint { opacity: .8; }

  /* 결과 강조 애니메이션 */
  .card.reveal-pop .front { animation: pop .5s ease; }
  @keyframes pop {
    0% { transform: rotateY(180deg) scale(1); }
    40% { transform: rotateY(180deg) scale(1.06); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  @media (max-width: 420px) {
    .card { --w: 28vw; }
    .cards { gap: 10px; }
  }
</style>
</head>
<body>
  <div class="embers" id="embers"></div>
  <div class="flash" id="flash"></div>

  <div class="wrap">
    <header>
      <div class="banner"><h1>운명의 카드</h1></div>
      <p class="subtitle">고민은 그만. 오늘의 선택은 카드가 대신 점지해 드립니다 🔮</p>
    </header>

    <section class="panel" id="panel">
      <label for="question">무엇을 고민하고 있나요?</label>
      <div class="input-row">
        <input id="question" type="text" maxlength="60"
               placeholder="예) 오늘 공부 몇 시간 할까?" autocomplete="off" />
        <button class="btn" id="drawBtn">카드 펼치기</button>
      </div>
      <div class="chips" id="chips"></div>
    </section>

    <section class="stage" id="stage">
      <div class="stage-title" id="stageTitle">카드를 1장 선택하세요</div>
      <div class="cards" id="cards"></div>
      <div class="controls" id="controls">
        <button class="btn" id="againBtn">다시 점지받기</button>
        <button class="btn secondary" id="resetBtn">새 질문</button>
      </div>
    </section>

    <footer>
      <div>🐾 운명의 카드 · 순수 HTML/CSS/JS · 어떤 결과도 진심으로 받아들이세요</div>
      <div class="hint">결과는 질문 유형을 분석해 매번 새롭게 골라집니다.</div>
    </footer>
  </div>

<script>
(function () {
  "use strict";

  /* ============================================================
     1. 떠다니는 불빛 입자 생성
  ============================================================ */
  (function makeEmbers() {
    const host = document.getElementById('embers');
    const N = 26;
    for (let i = 0; i < N; i++) {
      const e = document.createElement('div');
      e.className = 'ember';
      const size = 2 + Math.random() * 4;
      e.style.left = (Math.random() * 100) + 'vw';
      e.style.width = e.style.height = size + 'px';
      e.style.animationDuration = (8 + Math.random() * 10) + 's';
      e.style.animationDelay = (-Math.random() * 18) + 's';
      e.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
      e.style.opacity = 0.3 + Math.random() * 0.5;
      host.appendChild(e);
    }
  })();

  /* ============================================================
     2. 작은 효과음 (WebAudio, 외부 의존성 없음)
  ============================================================ */
  let actx = null;
  function tone(freq, dur, type, vol) {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = type || 'sine';
      o.frequency.value = freq;
      g.gain.value = 0.0001;
      o.connect(g); g.connect(actx.destination);
      const t = actx.currentTime;
      g.gain.exponentialRampToValueAtTime(vol || 0.08, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.25));
      o.start(t); o.stop(t + (dur || 0.25) + 0.02);
    } catch (_) {}
  }
  function sfxFlip() { tone(523, 0.12, 'triangle', 0.06); setTimeout(() => tone(784, 0.22, 'triangle', 0.07), 70); }
  function sfxDeal() { tone(330, 0.08, 'square', 0.03); }

  /* ============================================================
     3. "AI" 결과 생성기 — 질문 유형 분석 후 답안 선택
        (서버/키 없이 동작. 유형별 답안 풀에서 무작위 추출)
  ============================================================ */

  function pick(arr, n) {
    const copy = arr.slice();
    const out = [];
    while (out.length < n && copy.length) {
      out.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);
    }
    // 풀이 부족하면 중복 허용으로 채움
    while (out.length < n) out.push(arr[Math.floor(Math.random() * arr.length)]);
    return out;
  }
  function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // --- 음식 ---
  const FOODS = ['김치찌개','된장찌개','제육볶음','비빔밥','라면','떡볶이','마라탕','짜장면','짬뽕','탕수육',
    '초밥','돈까스','치킨','피자','파스타','국밥','순두부찌개','부대찌개','칼국수','냉면',
    '삼겹살','닭갈비','보쌈','족발','쌀국수','카레','햄버거','샐러드','김밥','우동',
    '규동','덮밥','쌈밥','곱창','막국수','감자탕','샌드위치','죽','비빔국수','enard'.replace('enard','전골')];
  function foodAnswers() {
    const picks = pick(FOODS, 3);
    const tmpl = [
      m => `오늘은 ${m}! 더 고민하지 마.`,
      m => `${m} 어때? 지금 딱이야.`,
      m => `운명은 ${m}를 가리킨다.`,
      m => `망설이지 말고 ${m} 먹자.`,
      m => `${m}이 너를 기다리고 있어.`
    ];
    return picks.map(m => rnd(tmpl)(m));
  }

  // --- 공부 / 시간 ---
  function studyAnswers() {
    const opts = [
      '오늘 하루는 푹 쉬자! 충전도 공부다.',
      '딱 30분만. 가볍게 시작하면 더 하게 돼.',
      '1시간. 짧고 굵게 집중!',
      '2시간이 적당해. 무리하지 말 것.',
      '3시간 빡공! 오늘의 너를 믿어.',
      '4시간 도전. 단, 50분마다 10분 휴식!',
      '시간보다 집중. 1시간 몰입이면 충분해.',
      '오늘은 복습만 1시간, 새 건 내일.',
      '딱 한 챕터만. 끝나면 자유다.'
    ];
    return pick(opts, 3);
  }

  // --- 할까 말까 / 예-아니오 / 고백 ---
  function yesNoAnswers(q) {
    const isConfess = /고백|좋아한다|사귀|연락|문자|전화/.test(q);
    if (isConfess) {
      return pick([
        '용기를 내. 후회보다 고백이 낫다.',
        '오늘은 타이밍이 아니야. 조금만 더 기다려.',
        '먼저 가볍게 연락부터. 천천히 가도 돼.',
        '마음을 전해. 결과보다 진심이 남는다.',
        '직진! 망설이는 사이 기회는 떠난다.',
        '진심이라면 망설이지 마. 다만 부담은 주지 말 것.',
        '지금 말고 다음 기회에. 더 좋은 순간이 온다.'
      ], 3);
    }
    return pick([
      '해라. 안 하면 분명 후회한다.',
      '하지 마. 지금은 때가 아니다.',
      '반반이다. 동전을 던질 거면 그냥 해.',
      '일단 작게 시도해보고 결정해.',
      '오늘은 멈추고, 내일 다시 생각해.',
      '직감을 믿어. 처음 떠오른 답이 맞다.',
      '조건이 맞으면 가. 무리면 접어.',
      'GO! 망설임은 여기까지.',
      '한 박자 쉬어가. 서두를 필요 없어.'
    ], 3);
  }

  // --- 멘트 / 뭐라고 말할까 ---
  function lineAnswers() {
    return pick([
      '"오늘 너 덕분에 좀 웃었다, 고마워."',
      '"우리 언제 밥 한 끼 할래?"',
      '"별일 없지? 문득 생각나서 연락했어."',
      '"네 생각보다 넌 훨씬 멋진 사람이야."',
      '"고생했어. 오늘은 네가 주인공이야."',
      '"그냥, 잘 지내나 궁금했어."',
      '"다음엔 내가 살게. 약속!"',
      '"네 이야기 더 듣고 싶어."'
    ], 3);
  }

  // --- 숫자 ---
  function numberAnswers() {
    const ns = pick([1,2,3,4,5,6,7,8,9], 3);
    return ns.map(n => `${n}. 이 숫자에 운이 따른다.`);
  }

  // --- 일반 (운명/점지 톤) ---
  function generalAnswers() {
    return pick([
      '지금 떠오른 그 선택, 그게 정답이다.',
      '오늘은 과감하게. 평소와 다르게 움직여 봐.',
      '쉬어가도 괜찮아. 멈춤도 한 걸음이다.',
      '직진해. 길은 가다 보면 열린다.',
      '한 박자 늦춰. 서두름이 일을 그르친다.',
      '주변에 도움을 청해. 혼자 짊어지지 마.',
      '작게 시작해. 첫걸음이 가장 무겁다.',
      '오늘의 행운은 용기 있는 자의 것.',
      '마음이 끌리는 쪽으로. 머리보다 가슴.',
      '잠시 내려놓고 산책 한 번. 답이 보일 거야.',
      '예상 밖의 선택이 오늘의 너를 구한다.',
      '믿어. 너는 생각보다 잘하고 있다.'
    ], 3);
  }

  function classify(q) {
    const s = (q || '').toLowerCase();
    if (/밥|점심|저녁|아침|메뉴|먹을|뭐\s*먹|음식|식사|야식|간식|뭐먹/.test(s)) return 'food';
    if (/(몇\s*시간|공부|시간).*(할까|하지|해야|할래)?|공부/.test(s) && /시간|공부/.test(s)) return 'study';
    if (/멘트|뭐라고|뭐라\s*말|문장|메시지|뭐라\s*보|카톡.*뭐|할\s*말/.test(s)) return 'line';
    if (/몇\s*(개|번|명|장|잔|시)/.test(s)) return 'number';
    if (/고백|좋아한다고|사귀|연락|할까\s*말까|살까|갈까|할까\?|말까|보낼까|살까\?|갈까\?/.test(s)) return 'yesno';
    if (/할까|말까|살까|갈까|볼까|먹을까|들까|쉴까|\?\s*$/.test(s)) return 'yesno';
    return 'general';
  }

  const TAGS = {
    food:   '오늘의 메뉴',
    study:  '집중 지령',
    line:   '운명의 한마디',
    number: '행운의 숫자',
    yesno:  '운명의 판결',
    general:'오늘의 점괘'
  };

  function generate(q) {
    const kind = classify(q);
    let answers;
    switch (kind) {
      case 'food':   answers = foodAnswers(); break;
      case 'study':  answers = studyAnswers(); break;
      case 'line':   answers = lineAnswers(); break;
      case 'number': answers = numberAnswers(); break;
      case 'yesno':  answers = yesNoAnswers(q); break;
      default:       answers = generalAnswers();
    }
    // 3장 보장 + 중복 제거 후 부족하면 일반 풀로 보충
    const seen = new Set(); const out = [];
    for (const a of answers) { if (!seen.has(a)) { seen.add(a); out.push(a); } }
    while (out.length < 3) {
      const extra = rnd(generalAnswers());
      if (!seen.has(extra)) { seen.add(extra); out.push(extra); }
    }
    return { tag: TAGS[kind] || TAGS.general, answers: out.slice(0, 3) };
  }

  /* ============================================================
     4. 카드 크레스트(앞면 상징) 풀
  ============================================================ */
  const CRESTS = ['🔮','⭐','🌙','🍀','🔥','💫','🗝️','🎴','🐾','☀️'];

  /* ============================================================
     5. UI 로직
  ============================================================ */
  const questionEl = document.getElementById('question');
  const drawBtn   = document.getElementById('drawBtn');
  const cardsEl   = document.getElementById('cards');
  const stageTitle= document.getElementById('stageTitle');
  const controls  = document.getElementById('controls');
  const againBtn  = document.getElementById('againBtn');
  const resetBtn  = document.getElementById('resetBtn');
  const flash     = document.getElementById('flash');
  const chipsEl   = document.getElementById('chips');

  const EXAMPLES = ['오늘 뭐 먹지?', '오늘 공부 몇 시간 할까?', '고백할까 말까?', '연락해볼까?', '오늘의 점괘'];
  EXAMPLES.forEach(t => {
    const c = document.createElement('button');
    c.className = 'chip'; c.type = 'button'; c.textContent = t;
    c.addEventListener('click', () => { questionEl.value = t; questionEl.focus(); });
    chipsEl.appendChild(c);
  });

  let picked = false;       // 이번 라운드에서 카드를 골랐는지
  let currentResult = null; // {tag, answers}

  function buildCards(result) {
    cardsEl.innerHTML = '';
    picked = false;
    controls.classList.remove('show');
    const crests = pick(CRESTS, 3);

    result.answers.forEach((ans, i) => {
      const card = document.createElement('div');
      card.className = 'card hoverable';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', '카드 ' + (i + 1));

      card.innerHTML =
        '<div class="card-inner">' +
          '<div class="face back">' +
            '<div class="rune">?</div>' +
            '<div class="paw">🐾</div>' +
          '</div>' +
          '<div class="face front">' +
            '<div class="crest">' + crests[i] + '</div>' +
            '<div class="result">' + escapeHtml(ans) + '</div>' +
            '<div class="tag">' + escapeHtml(result.tag) + '</div>' +
          '</div>' +
        '</div>';

      const choose = (ev) => onChoose(card, ev);
      card.addEventListener('click', choose);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(e); }
      });
      cardsEl.appendChild(card);
      sfxDeal();
    });

    stageTitle.textContent = '카드를 1장 선택하세요';
    stageTitle.classList.add('show');
  }

  function onChoose(card, ev) {
    if (picked) return;
    picked = true;

    // 빛 번쩍 위치
    let x = 50, y = 50;
    if (ev && ev.clientX) {
      x = (ev.clientX / window.innerWidth) * 100;
      y = (ev.clientY / window.innerHeight) * 100;
    } else {
      const r = card.getBoundingClientRect();
      x = ((r.left + r.width / 2) / window.innerWidth) * 100;
      y = ((r.top + r.height / 2) / window.innerHeight) * 100;
    }
    flash.style.setProperty('--fx', x + '%');
    flash.style.setProperty('--fy', y + '%');
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
    sfxFlip();
    spawnSparkles(card);

    // 나머지 카드 흐리게, 선택 카드 뒤집기
    Array.from(cardsEl.children).forEach(c => {
      c.classList.remove('hoverable');
      if (c !== card) c.classList.add('dimmed');
    });
    card.classList.add('flipped', 'reveal-pop');

    stageTitle.textContent = '운명이 답했습니다';
    setTimeout(() => controls.classList.add('show'), 650);
  }

  function spawnSparkles(card) {
    const r = card.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    for (let i = 0; i < 16; i++) {
      const s = document.createElement('div');
      s.textContent = ['✦','✧','⋆','✨'][i % 4];
      s.style.cssText =
        'position:fixed;left:' + cx + 'px;top:' + cy + 'px;z-index:60;pointer-events:none;' +
        'font-size:' + (10 + Math.random() * 14) + 'px;color:' +
        (Math.random() > .5 ? '#f5c542' : '#b169e0') + ';will-change:transform,opacity;';
      document.body.appendChild(s);
      const ang = Math.random() * Math.PI * 2;
      const dist = 60 + Math.random() * 120;
      const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist;
      s.animate(
        [
          { transform: 'translate(-50%,-50%) translate(0,0) scale(1)', opacity: 1 },
          { transform: 'translate(-50%,-50%) translate(' + dx + 'px,' + dy + 'px) scale(.2)', opacity: 0 }
        ],
        { duration: 600 + Math.random() * 400, easing: 'cubic-bezier(.2,.7,.3,1)' }
      ).onfinish = () => s.remove();
    }
  }

  function draw() {
    const q = questionEl.value.trim();
    currentResult = generate(q);
    stageTitle.classList.remove('show');
    // 살짝 지연 후 카드 재배치 (덜 갑작스럽게)
    setTimeout(() => buildCards(currentResult), 120);
    document.getElementById('stage').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function again() {
    // 같은 질문, 새 답안
    if (!questionEl.value.trim() && currentResult) { /* keep */ }
    draw();
  }

  function reset() {
    cardsEl.innerHTML = '';
    controls.classList.remove('show');
    stageTitle.classList.remove('show');
    questionEl.value = '';
    questionEl.focus();
    document.getElementById('panel').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => (
      { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
    ));
  }

  drawBtn.addEventListener('click', draw);
  questionEl.addEventListener('keydown', e => { if (e.key === 'Enter') draw(); });
  againBtn.addEventListener('click', again);
  resetBtn.addEventListener('click', reset);
})();
</script>
</body>
</html>
